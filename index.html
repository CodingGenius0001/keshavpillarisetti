<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keshav Pillarisetti</title>
  <meta name="description" content="Supernova's world - Keshav Pillarisetti, builder and developer." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="home">
  <div class="bg-canvas-wrap" aria-hidden="true">
    <canvas id="pixelCanvas"></canvas>
    <div class="bg-gradient"></div>
  </div>

  <div class="page-shell">
    <header class="topbar">
      <a class="top-name" href="/" aria-label="Keshav Pillarisetti home">Keshav Pillarisetti</a>
      <button
        class="nav-menu-toggle"
        id="navMenuToggle"
        type="button"
        aria-label="toggle navigation"
        aria-controls="topNavLinks"
        aria-expanded="false"
      >
        &#9776;
      </button>
      <nav class="nav-links" id="topNavLinks">
        <a href="/" aria-current="page">home</a>
        <a href="/about/">about</a>
        <a href="/skills/">skills</a>
      </nav>
    </header>

    <main class="hero-full">
      <div class="hero-icosa" id="heroIcosa" aria-hidden="true"></div>
      <p class="eyebrow text-glass text-glass-eyebrow">supernova's world</p>
      <h1 class="hero-line text-glass text-glass-hero">
        <span class="hero-name">Keshav Pillarisetti</span>
        <span class="divider">/</span>
        <span id="typewriter"></span>
      </h1>

      <div class="cta-row">
        <a class="cta" href="https://x.com/_keshavp" target="_blank" rel="noreferrer">twitter</a>
        <a class="cta" href="https://github.com/CodingGenius0001" target="_blank" rel="noreferrer">github</a>
        <a class="cta" href="https://mail.google.com/mail/?view=cm&fs=1&to=pkeshav.business@gmail.com" target="_blank" rel="noreferrer">email</a>
        <button class="cta primary" id="bookCallBtn" type="button">book a call</button>
      </div>
    </main>
  </div>

  <div id="cal-modal" class="cal-modal" hidden>
    <div class="cal-modal-backdrop"></div>
    <div class="cal-modal-panel" role="dialog" aria-modal="true" aria-labelledby="cal-title">
      <div class="cal-modal-header">
        <h2 id="cal-title">Book a call</h2>
        <button class="cal-close" type="button" aria-label="Close scheduler">×</button>
      </div>
      <div id="cal-embed" aria-label="Schedule a 30 minute call"></div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
